<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>粤鑫金 - 实时贵金属行情</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css?v=admin-entry-20260701">
</head>
<body class="min-h-screen">

<header class="header-bar">
  <div class="header-inner">
    <div class="header-qr-card" aria-label="关注粤鑫金二维码">
      <img src="images/store-wechat-qr.jpg" alt="粤鑫金店铺微信二维码" class="header-qr-img">
      <div class="header-qr-copy">
        <div class="header-qr-title">关注粤鑫金</div>
        <div class="header-qr-subtitle">了解实时行情</div>
      </div>
    </div>
    <div class="header-center">
      <div class="logo-section">
        <div class="logo-circle">
          <img src="images/store/logo.jpg"
               alt="粤鑫金" class="logo-img"
               onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
          <div class="logo-fallback" style="display:none;">粤鑫<br>金</div>
        </div>
        <div class="logo-text">
          <h1 class="logo-title">粤鑫金</h1>
        </div>
      </div>
      <div class="header-time" id="header-datetime">--</div>
    </div>
    <div class="header-spacer" aria-hidden="true"></div>
  </div>
</header>

<main class="main-container" id="main-container">
  <section class="page-section active" id="section-market">
    <div class="price-hero">
      <div class="price-combo-card">
        <div class="price-card sale-card" id="sale-card">
          <div class="price-row">
            <div class="price-main">
              <div class="price-label">今日金价</div>
              <div class="price-value-wrap">
                <span class="price-value" id="current-price">--</span>
                <span class="price-unit">元/克</span>
              </div>
            </div>
          </div>
        </div>

        <div class="price-card buyback-card" id="buyback-card">
          <div class="price-label">回购金价</div>
          <div class="price-value-wrap">
            <span class="price-value" id="buyback-price">--</span>
            <span class="price-unit">元/克</span>
          </div>
        </div>
      </div>
    </div>

    <div class="certificate-carousel" aria-label="资质证书播放">
      <div class="certificate-track" id="certificate-track">
        <img class="certificate-slide" src="images/certificates/lppm-platinum.jpg" alt="LPPM铂金交割资质">
        <img class="certificate-slide" src="images/certificates/sge-membership.jpg" alt="上交所综合类会员资质">
        <img class="certificate-slide" src="images/certificates/sge-gold-ingot.jpg" alt="上金所标准金锭供应商资质">
        <img class="certificate-slide" src="images/certificates/sge-silver-ingot.jpg" alt="上金所标准银锭供应商资质">
        <img class="certificate-slide" src="images/certificates/lbma-silver.jpg" alt="LBMA白银交割资质">
        <img class="certificate-slide" src="images/certificates/lbma-gold.jpg" alt="LBMA黄金交割资质">
        <img class="certificate-slide" src="images/certificates/lppm-palladium.jpg" alt="LPPM钯金交割资质">
      </div>
    </div>

    <div class="fixed-price-note">
      <i class="fa fa-lock"></i>
      <span>交易时间 10:00 至 20:00，价格以门店最新调整为准</span>
    </div>
  </section>
</main>

<a class="admin-entry-link" id="admin-entry-link" href="/gold-api/admin" aria-label="进入金价后台登录页面">
  <i class="fa fa-user-secret" aria-hidden="true"></i>
  <span>后台入口</span>
</a>

<span id="update-time" hidden></span>
<span id="price-spread" hidden></span>
<span id="record-status" hidden></span>
<script>
  (function () {
    var adminEntry = document.getElementById('admin-entry-link');
    if (!adminEntry) return;
    var params = new URLSearchParams(window.location.search);
    var token = params.get('eo_token');
    var time = params.get('eo_time');
    if (token && time) {
      adminEntry.href = '/gold-api/admin?eo_token=' + encodeURIComponent(token) + '&eo_time=' + encodeURIComponent(time);
    }
  })();
</script>
<script src="js/app.js?v=fixed-price-no-meta-20260630"></script>
</body>
</html>
